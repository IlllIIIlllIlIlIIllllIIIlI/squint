# git-cliff configuration
# https://git-cliff.org/docs/configuration
#
# Usage:
#   git cliff --unreleased --prepend CHANGELOG.md   # append new commits to the top
#   git cliff --tag 0.2.0 --prepend CHANGELOG.md    # generate for a specific tag
#   git cliff                                        # preview output

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
The format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).
This project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.breaking %} [**breaking**]{% endif %}
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = []
commit_parsers = [
    { message = "^chore", group = "Miscellaneous" },
    { message = "^ci", group = "CI" },
    { message = "^docs", group = "Documentation" },
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^revert", group = "Reverted" },
    { message = "^test", group = "Testing" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
