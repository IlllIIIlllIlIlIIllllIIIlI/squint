- id: squint
  name: squint
  description: Lint SQL files for style violations.
  language: rust
  entry: squint
  types_or: [sql]
  pass_filenames: true

- id: squint-fix
  name: squint (fix)
  description: >
    Lint SQL files and auto-fix all fixable violations in place.
    pre-commit will re-stage the modified files.
  language: rust
  entry: squint --fix
  types_or: [sql]
  pass_filenames: true
