name: Publish to PyPI

# Runs after a GitHub Release is published (by the release.yml workflow).
# Builds platform-specific wheels with maturin and uploads them to PyPI.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Build one wheel per target platform
  # -----------------------------------------------------------------------
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            maturin-target: x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            maturin-target: aarch64

          - target: x86_64-apple-darwin
            os: macos-13
            maturin-target: x86_64

          - target: aarch64-apple-darwin
            os: macos-14
            maturin-target: aarch64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            maturin-target: x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --strip --out dist
          target: ${{ matrix.maturin-target }}
          # Use zig-based cross-compilation for Linux aarch64
          manylinux: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '2_28' || 'auto' }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  # -----------------------------------------------------------------------
  # Collect all wheels and publish to PyPI
  # -----------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/squint
    permissions:
      id-token: write  # for trusted publishing (OIDC)

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List wheels to publish
        run: ls -lh dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
