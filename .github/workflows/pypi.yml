name: Publish to PyPI

# Runs after a GitHub Release is published (by the release.yml workflow).
# Builds platform-specific wheels with maturin and uploads them to PyPI.
on:
  release:
    types: [published]

# Default to read-only. The publish job explicitly adds id-token: write
# for OIDC Trusted Publishing.
permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Build one wheel per target platform
  # -----------------------------------------------------------------------
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            maturin-target: x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            maturin-target: aarch64

          - target: x86_64-apple-darwin
            os: macos-13
            maturin-target: x86_64

          - target: aarch64-apple-darwin
            os: macos-14
            maturin-target: aarch64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            maturin-target: x64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1
        with:
          command: build
          args: --release --strip --out dist
          target: ${{ matrix.maturin-target }}
          # Use zig-based cross-compilation for Linux aarch64
          manylinux: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '2_28' || 'auto' }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  # -----------------------------------------------------------------------
  # Collect all wheels and publish to PyPI
  # -----------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/squint
    permissions:
      id-token: write  # for OIDC Trusted Publishing

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List wheels to publish
        run: ls -lh dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/
