name: Publish to PyPI

# Triggers on version tag pushes (same as release.yml).
# Note: GitHub does not fire the `release: published` event for releases
# created by GITHUB_TOKEN, so we trigger on the tag push directly instead.
on:
  push:
    tags:
      - 'v[0-9]*'

# Default to read-only. The publish job explicitly adds id-token: write
# for OIDC Trusted Publishing.
permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Build one wheel per target platform
  # -----------------------------------------------------------------------
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            maturin-target: x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            maturin-target: aarch64

          - target: x86_64-apple-darwin
            os: macos-14
            maturin-target: x86_64

          - target: aarch64-apple-darwin
            os: macos-14
            maturin-target: aarch64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            maturin-target: x64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          args: --release --strip --out dist
          target: ${{ matrix.maturin-target }}
          # Use zig-based cross-compilation for Linux aarch64
          manylinux: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '2_28' || 'auto' }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  # -----------------------------------------------------------------------
  # Collect all wheels and publish to PyPI
  # -----------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pysquint
    permissions:
      id-token: write  # for OIDC Trusted Publishing

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List wheels to publish
        run: ls -lh dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
